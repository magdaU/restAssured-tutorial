name: Allure Report

on:
  push:
    branches:
      - main
      - 'feature/**'
      - 'fix/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test-and-publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Checkout gh-pages for Allure history
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      - name: Set up Java 18
        uses: actions/setup-java@v4
        with:
          java-version: '18'
          distribution: 'temurin'
          cache: 'maven'

      - name: Copy Allure history from previous run
        run: |
          mkdir -p target/allure-results/history
          if [ -d "gh-pages/history" ]; then
            cp -r gh-pages/history/. target/allure-results/history/
            echo "History copied from gh-pages"
          else
            echo "No previous history found — first run"
          fi

      - name: Run tests
        run: mvn "-Dtest=VideoGameTests,VideoGameNegativeTests,VideoGameParameterizedTests,VideoGameNegativeParameterizedTests,GpathJSONTest,GpathXMLTests,MyFirstVideoGame" test

      - name: Generate Allure report
        run: mvn allure:report

      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./target/site/allure-maven-plugin