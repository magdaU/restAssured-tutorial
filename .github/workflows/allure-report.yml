name: Allure Report

on:
  push:
    branches:
      - main
      - 'feature/**'
      - 'fix/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  test-and-publish:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 18
        uses: actions/setup-java@v4
        with:
          java-version: '18'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run tests
        run: mvn "-Dtest=VideoGameTests,VideoGameNegativeTests,VideoGameParameterizedTests,VideoGameNegativeParameterizedTests,GpathJSONTest,GpathXMLTests,MyFirstVideoGame" test

      - name: Generate Allure report
        run: mvn allure:report

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./target/site/allure-maven-plugin

      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main'
        id: deploy
        uses: actions/deploy-pages@v4
